<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlantShed Field Log</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=7">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.png?v=7">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#404041">

    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #404041; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f2f2f2; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
        }
        #splash {
            position: fixed; inset: 0; background: #FFFFFF; z-index: 10001;
            display: flex; align-items: center; justify-content: center;
            transition: opacity .3s ease-out, visibility 0.5s;
        }
        #splash img { width: 85%; max-width: 360px; height: auto; display: block; transform: translate(0, -20px); }
        .hide-splash { opacity: 0; visibility: hidden; }

        .container { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 10px 15px; max-width: 500px; margin: 0 auto; width: 100%; 
            padding-bottom: calc(40px + env(safe-area-inset-bottom)); 
        }

        .logo-container { text-align: center; padding: 10px 0; display: flex; justify-content: center; align-items: center; }
        .logo-container img { height: 75px; width: auto; max-width: 90%; display: block; }

        .card { background: white; padding: 15px ; border-radius: 12px; box-shadow: 0 4px 7px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 8px 0; text-align: center; color: var(--primary); font-size: 1rem; font-weight: 600; }
        label { font-weight: bold; color: #666; font-size: 0.85rem; display: block; margin-top: 10px; }
        
        select, input { 
            width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #eee; 
            border-radius: 12px; font-size: 1rem; background: #fafafa; outline: none; 
        }

        /* Overrides the browser default "fade" for disabled inputs */
        select:disabled, input:disabled {
            opacity: 1 !important;
            color: #444 !important; /* Ensures the text stays dark */
            background-color: #fafafa !important; /* Keeps the background consistent */
            -webkit-text-fill-color: #444 !important; /* Required for iOS Safari */
        }
         
        /* --developed by jason.h@plantshed.com-- */
        .gps-status { margin: 12px 40px; transform: translate(0, 10px); padding: 7px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 0.75rem; background: #eee; color: #666; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

       .footer { 
        margin-top: auto; 
        display: grid; 
        grid-template-columns: 1fr 1fr; /* Two buttons side-by-side by default */
        gap: 12px; 
        padding-bottom: 10px; 
    }

    /* This class is added via JS when a successful Check-In happens */
    .footer.single-btn {
        grid-template-columns: 1fr;
    }

    .btn { 
        height: 100px; 
        border: none; 
        border-radius: 12px; 
        color: white; 
        font-size: 1.5rem; 
        font-weight: 400; 
        transition: all 0.2s ease;
    }

    button:disabled { 
        opacity: 0.3; 
        pointer-events: none; /* Physical touch block */
    }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }

        #resetLink { text-align: center; font-size: 10px; color: #bbb; margin-top: 10px; padding-bottom: 15px; text-decoration: underline; cursor: pointer; }

        .status-option {
            width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #eee; 
            border-radius: 12px; background: #fafafa; font-size: 0.95rem; color: #444; 
            text-align: center; transition: all 0.2s; cursor: pointer;
        }
        .status-option.active { border-color: var(--success); background: #e8f5e9; color: #155724; font-weight: bold; }
        .menu-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 40px; }
        .btn-small { height: 50px; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 1rem; }
        .logo-loader {
                position: relative;
                width: 100px;  /* Match your branding size */
                height: 100px;
                margin: 0 auto 40px auto;
                overflow: hidden;
            }

            .logo-bg {
                width: 100%;
                height: 100%;
                opacity: 0.1; /* Makes it look like a grey outline/shell */
                filter: grayscale(1);
            }

            .logo-fill {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                
                
                /* The rising water animation */
                animation: logo-fill-animation 2.5s ease-in-out infinite;
            }

            @keyframes logo-fill-animation {
                0% {
                    clip-path: inset(100% 0 0 0); /* Start at very bottom */
                }
                70% {
                    clip-path: inset(0% 0 0 0);   /* Rise to the top */
                }
                100% {
                    clip-path: inset(0% 0 0 0);   /* Hold full for a second */
                    opacity: 0;                   /* Fade out to loop smoothly */
                }
            }
         #submitOverlay {
    padding: 0 !important; /* Remove padding here so the inner successState can handle it */
}

#successState {
    padding: 10px 15px !important; /* Match your main .container padding */
    display: flex;
    flex-direction: column;
}

#successState .footer {
    grid-template-columns: 1fr; /* Force single column for the tap button */
    width: 100%;
}
    </style>
    
    
</head>
<body>

<div id="splash">
    <img src="pslogo.svg" alt="PlantShed Logo">
    <div style="position: absolute; bottom: 30px; font-size: 10px; color: #999;">
        &copy; 2026 PlantShed Design Studio
       
    </div>
</div>
    
<div class="container">
    <div class="logo-container">
        <img src="pslogo.svg" alt="PlantShed Logo">
    </div>

    <div class="card">
        <h2 id="greeting">Field Log</h2>
        
        <label>Employee Name</label>
        <select id="worker">
            <option value="" disabled selected>Loading Employees...</option>
        </select>

        <label>Account & Site Address</label>
        <select id="site">
            <option value="" disabled selected>Waiting for GPS...</option>
        </select>

        <div id="addressDisplay" style="font-size: .9rem; color: #404040; margin-top: 10px; padding: 0 5px; min-height: 14px; font-style: italic;"></div>

        <label>Job Type</label>
        <select id="task">
            <option value="Routine Maintenance">Routine Maintenance</option>
            <option value="Refresh/Replacement">Refresh/Replacement</option>
            <option value="Install">Install</option>
            <option value="Audit">Audit</option>
        </select>

        <div id="gpsBox" class="gps-status">🛰️ Verifying location...</div>
    </div>

    <div class="footer">
        <button id="inBtn" class="btn btn-in" disabled>Check In</button>
        <button id="outBtn" class="btn btn-out" disabled>Check Out</button>
    </div>

    <div id="resetLink" onclick="resetUser()">Switch User / Reset Device</div>
</div>

<div id="outMenu" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:20000; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:400px;">
        <h3 style="margin:0 0 15px 0; text-align:center; font-size:1.1rem;">Clock Out Status</h3>
        
        <div id="optionsList">
            <div class="status-option" onclick="selectOption(this, 'Completed')">Job has been completed</div>
            <div class="status-option" onclick="selectOption(this, 'No Access')">I was not able to access site</div>
            <div class="status-option" onclick="selectOption(this, 'Replacement Noted')">Maintenance team noted replacement</div>
        </div>

        <div class="menu-footer">
            <button id="submitMenuBtn" class="btn-small btn-in" style="opacity:0.2;" disabled onclick="processFinalOut()">Submit</button>
            <button id="cancelMenuBtn" class="btn-small btn-out" onclick="closeMenu()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9O2nDSumFn4cKnnQY4DfRa5tzaIqOKFUGgTQpZ2-HkuE_4ON_nswz_rwxNUFcyMkH/exec";
    let loc = null;
    let clientList = [];
    let selectedStatus = ""; 

    // --- FORCE REFRESH / UPDATE CHECK ---
    setInterval(checkServerForUpdates, 1800000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") checkServerForUpdates(); });

    async function checkServerForUpdates() {
        try {
            const versionCheckUrl = "manifest.json?v=" + new Date().getTime();
            const response = await fetch(versionCheckUrl, { method: 'GET', cache: 'no-store' });
            const lastModified = response.headers.get("Last-Modified");
            const cachedModified = localStorage.getItem("last_update");
            if (cachedModified && lastModified !== cachedModified) {
                localStorage.setItem("last_update", lastModified);
                window.location.href = window.location.origin + window.location.pathname + "?update=" + new Date().getTime();
            } else {
                localStorage.setItem("last_update", lastModified);
            }
        } catch (err) { console.log("Update check skipped"); }
    }
    checkServerForUpdates();

    window.onload = async function() {
        console.log("App log by Jason Hao Huang, jason.h@plantshed.com, jasonhaohuang@gmail.com");
        setTimeout(() => document.getElementById('splash').classList.add('hide-splash'), 1500);
        await loadData();
        initGPS();
    };

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            // Restore Employee Loading
            const workerSelect = document.getElementById('worker');
            workerSelect.innerHTML = '<option value="" disabled selected>Select Name</option>';
            data.employees.forEach(name => {
                const opt = document.createElement('option');
                opt.value = opt.innerText = name;
                workerSelect.appendChild(opt);
            });
            clientList = data.clients; 

            const savedUser = localStorage.getItem('ps_user');
            if (savedUser) workerSelect.value = savedUser;

            const savedSite = localStorage.getItem('ps_last_site');
            const savedTask = localStorage.getItem('ps_last_task');
            const savedDate = localStorage.getItem('ps_last_date');
            const today = new Date().toLocaleDateString();

            if (savedSite && savedDate === today) {
                if (savedTask) document.getElementById('task').value = savedTask;
                toggleLock(true);
            } else {
                localStorage.removeItem('ps_last_site');
                localStorage.removeItem('ps_last_task');
                localStorage.removeItem('ps_last_date');
                toggleLock(false); 
            }
        } catch (e) { console.error("Load failed", e); }
    }

    function toggleLock(shouldLock) {
        const ids = ['worker', 'site', 'task'];
        const inBtn = document.getElementById('inBtn');
        const footer = document.querySelector('.footer');
        
        ids.forEach(id => {
            document.getElementById(id).disabled = shouldLock;
        });

        if (shouldLock) {
            inBtn.style.display = "none";
            footer.classList.add('single-btn');
        } else {
            inBtn.style.display = "block";
            footer.classList.remove('single-btn');
            if (!loc) {
                inBtn.disabled = true;
                inBtn.style.opacity = "0.3";
            }
        }
        document.getElementById('outBtn').disabled = false;
        document.getElementById('outBtn').style.opacity = "1";
    }

    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const acc = Math.round(pos.coords.accuracy);
            loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const status = document.getElementById('gpsBox');
            const isLocked = document.getElementById('worker').disabled;

            if (acc <= 150) {
                status.innerHTML = `✅ Location ready`;
                status.className = "gps-status ready";
                if (!isLocked) {
                    document.getElementById('inBtn').disabled = false;
                    document.getElementById('inBtn').style.opacity = "1";
                }
            } else {
                status.innerHTML = `🛰️ Searching... (${acc}m)`;
                if (!isLocked) {
                    document.getElementById('inBtn').disabled = true;
                    document.getElementById('inBtn').style.opacity = "0.3";
                }
            }
            document.getElementById('outBtn').disabled = false;
            updateNearbySites(); 
        }, (err) => {
            document.getElementById('gpsBox').innerText = "❌ GPS blocked!";
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
    }

    function updateNearbySites() {
        if (!loc || !clientList.length) return;
        const siteSelect = document.getElementById('site');
        const savedSite = localStorage.getItem('ps_last_site');
        if (siteSelect.value !== "" && !siteSelect.disabled) return; 
        
        if (savedSite && siteSelect.disabled) {
            siteSelect.innerHTML = `<option value="${savedSite}" selected>${savedSite.split('|')[0]}</option>`;
            syncAddressLabel();
            return;
        }

        const nearby = clientList.filter(site => getDistance(loc.lat, loc.lng, site.lat, site.lng) <= 150);
        if (siteSelect.value === "") {
            siteSelect.innerHTML = '<option value="" disabled selected>Select Nearby Client</option>';
            nearby.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.account + "|" + c.address;
                opt.innerText = c.account; 
                if (opt.value === savedSite) opt.selected = true;
                siteSelect.appendChild(opt);
            });
            syncAddressLabel();
        }
    }

    function syncAddressLabel() {
        const val = document.getElementById('site').value;
        const display = document.getElementById('addressDisplay');
        display.innerHTML = (val && val.includes("|")) ? "📍 " + val.split("|")[1] : "";
    }

    function selectOption(element, statusValue) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        selectedStatus = statusValue;
        document.getElementById('submitMenuBtn').disabled = false;
        document.getElementById('submitMenuBtn').style.opacity = "1";
    }

    function closeMenu() {
        document.getElementById('outMenu').style.display = 'none';
        selectedStatus = "";
        document.getElementById('submitMenuBtn').disabled = true;
        document.getElementById('submitMenuBtn').style.opacity = "0.2";
    }

    async function processFinalOut() {
        if (document.getElementById('submitMenuBtn').disabled) return;
        if (!selectedStatus) return;
        const status = selectedStatus;
        closeMenu();
        await submit("CLOCK OUT", status);
    }

    async function submit(action, statusUpdate = "DONE") {
    if (action === "CLOCK IN" && document.getElementById('inBtn').disabled) return;

    const worker = document.getElementById('worker').value;
    const siteRaw = document.getElementById('site').value;
    const task = document.getElementById('task').value;
    if (!worker || !siteRaw) return alert("Select Name and Site.");

    const [account, siteAddress] = siteRaw.split("|");
    
    // --- SHOW LOADING ---
    const overlay = document.getElementById('submitOverlay');
    const loadingState = document.getElementById('loadingState');
    const successState = document.getElementById('successState');
    
    document.getElementById('loadingText').innerText = (action === "CLOCK IN" ? "Checking in..." : "Checking out...");
    overlay.style.display = "flex";
    loadingState.style.display = "block";
    successState.style.display = "none";

    try {
        let durationText = "";
        
        if (action === "CLOCK IN") {
            const now = new Date();
            localStorage.setItem('ps_user', worker);
            localStorage.setItem('ps_last_site', siteRaw);
            localStorage.setItem('ps_last_task', task);
            localStorage.setItem('ps_last_date', now.toLocaleDateString());
            localStorage.setItem('ps_start_ms', now.getTime()); // For time calc
        } else {
            // Calculate Total Time
            const startMs = localStorage.getItem('ps_start_ms');
            if (startMs) {
                const diff = Date.now() - parseInt(startMs);
                const hours = Math.floor(diff / 3600000);
                const mins = Math.floor((diff % 3600000) / 60000);
                durationText = `Total time: ${hours}h ${mins}m`;
            }
            // Clear specific job data but keep user
            localStorage.removeItem('ps_last_site');
            localStorage.removeItem('ps_last_task');
            localStorage.removeItem('ps_last_date');
            localStorage.removeItem('ps_start_ms');
        }

        // --- PING SERVER ---
        await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                worker: worker, account: account, siteAddress: siteAddress,
                task: task, action: action, statusUpdate: statusUpdate,
                gps: `${loc.lat},${loc.lng}`,
                _dev: "Jason Hao Huang"
            })
        });

        // --- SHOW SUCCESS SUMMARY ---
        loadingState.style.display = "none";
        successState.style.display = "block";
        
        document.getElementById('successAction').innerText = (action === "CLOCK IN" ? "Checked in at" : "Checked out at");
        document.getElementById('successDetail').innerHTML = `<strong>${account}</strong><br>${siteAddress}`;
        document.getElementById('totalTime').innerText = durationText;

    } catch (e) {
        overlay.style.display = "none";
        alert("Connection Error. Please try again.");
    }
}       

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    document.getElementById('inBtn').onclick = () => submit("CLOCK IN");
    document.getElementById('outBtn').onclick = () => document.getElementById('outMenu').style.display = 'flex';
    document.getElementById('site').addEventListener('change', () => {
        syncAddressLabel();
        const val = document.getElementById('site').value;
        if (val) localStorage.setItem('ps_last_site', val);
    });
    document.getElementById('task').addEventListener('change', function() {
        localStorage.setItem('ps_last_task', this.value);
    });
    
    function resetUser() {
        if (confirm("Reset Device?")) { localStorage.clear(); location.reload(); }
    }
    //--developed by jason.h@plantshed.com--
</script>

<div id="submitOverlay" style="display:none; position:fixed; inset:0; background:white; z-index:30000; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    
    <div id="loadingState" style="padding: 30px;">
        <div class="logo-loader">
            <img src="logomark.svg" class="logo-bg">
            <img src="logomark.svg" class="logo-fill">
        </div>
        <h2 id="loadingText" style="color:#404041;">Logging...</h2>
    </div>

    <div id="successState" style="display:none; height:100vh; width:100%; flex-direction:column; background:white; padding: 10px 15px;">
        
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
            <div style="color:var(--success); font-size:4.5rem; margin-bottom:10px;">✓</div>
            <h2 id="successAction" style="margin-bottom:5px; color:var(--primary); font-size:1.5rem;">Action Complete</h2>
            <div id="successDetail" style="font-size:1.15rem; color:#666; margin:10px 0; line-height:1.4;"></div>
            <p id="totalTime" style="font-weight:bold; color:var(--primary); font-size:1.2rem; margin-top:10px;"></p>
        </div>

        <div class="footer">
            <button onclick="location.reload()" 
                    style="height:100px; border:none; background:none; color:var(--primary); font-size:1.2rem; font-weight:600; cursor:pointer; width:100%; text-align: center;">
                Tap to continue >
            </button>
        </div>
    </div>
</div>
</body>
</html>
