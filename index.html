<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Plantshed Field Log</title>
    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #1a73e8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 15px 0; text-align: center; color: #333; font-size: 1.5rem; }
        label { font-weight: bold; color: #666; font-size: 0.85rem; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 16px; margin-top: 5px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; background: #fafafa; outline: none; }
        .gps-status { margin: 20px 0; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 1rem; background: #eee; color: #666; }
        .ready { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .footer { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: calc(30px + env(safe-area-inset-bottom)); }
        .btn { height: 120px; border: none; border-radius: 22px; color: white; font-size: 1.4rem; font-weight: 900; box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        button:disabled { opacity: 0.5; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>PlantShed Field Log</h2>
        <label>Worker Name</label>
        <input type="text" id="worker" placeholder="Full Name Here">
        <label>Job Type (select correct job)</label>
        <select id="task">
            <option value="Install">Install</option>
            <option value="Routine Maintenance">Routine Maintenance</option>
            <option value="Audit">Audit</option>
        </select>
        <div id="gpsBox" class="gps-status">🛰️ VERIFYING LOCATION...</div>
    </div>
    <div class="footer">
        <button id="inBtn" class="btn btn-in" disabled>CLOCK<br>IN</button>
        <button id="outBtn" class="btn btn-out" disabled>CLOCK<br>OUT</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxp4Wv1YVOqlCuXsYXLr7wgTySVQrOJW-Vi2T5mTQ4gwpCS8b5IT6ggbaECLNcPFya9/exec";
    let loc = null;

    window.onload = function() {
        navigator.geolocation.watchPosition((pos) => {
            const acc = Math.round(pos.coords.accuracy);
            loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const status = document.getElementById('gpsBox');
            
            if (acc <= 300) {
                status.innerHTML = `✅ LOCATION VERIFIED`;
                status.className = "gps-status ready";
                document.getElementById('inBtn').disabled = false;
                document.getElementById('outBtn').disabled = false;
            }
        }, null, { enableHighAccuracy: true });
    };

    async function submit(action) {
        const worker = document.getElementById('worker').value.trim();
        if (!worker) return alert("Enter Name");

        document.getElementById('inBtn').disabled = true;
        document.getElementById('outBtn').disabled = true;
        document.getElementById('gpsBox').innerText = "⌛ SAVING...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    worker: worker,
                    task: document.getElementById('task').value,
                    action: action,
                    gps: `${loc.lat},${loc.lng}`
                })
            });
            alert("Success!");
            location.reload();
        } catch (e) {
            alert("Error. Try again.");
            document.getElementById('inBtn').disabled = false;
            document.getElementById('outBtn').disabled = false;
        }
    }

    document.getElementById('inBtn').onclick = () => submit("CLOCK IN");
    document.getElementById('outBtn').onclick = () => submit("CLOCK OUT");
</script>
</body>
</html>
