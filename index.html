<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlantShed Field Log</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=7">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.png?v=7">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#404041">

    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #404041; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f2f2f2; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
        }

        /* Splash Screen */
        #splash {
            position: fixed; inset: 0; background: #FFFFFF; z-index: 10001;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        #splash svg { width: 85%; height: auto; max-width: 360px; display: block; }
        .hide-splash { opacity: 0; visibility: hidden; }

        .container { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 15px; max-width: 500px; margin: 0 auto; width: 100%; 
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
        }

        .logo-container { text-align: center; padding: 20px 0; }
        .logo-container svg { height: 40px; width: auto; }

        .card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 10px 0; text-align: center; color: var(--primary); font-size: 1.1rem; font-weight: 600; }
        label { font-weight: bold; color: #666; font-size: 0.9rem; display: block; margin-top: 12px; }
        
        select, input { 
            width: 100%; padding: 14px; margin-top: 5px; border: 2px solid #eee; 
            border-radius: 12px; font-size: 1rem; background: #fafafa; outline: none; 
        }

        .gps-status { margin: 15px 0; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 0.85rem; background: #eee; color: #666; }
        .ready { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }

        .footer { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { height: 100px; border: none; border-radius: 18px; color: white; font-size: 1.2rem; font-weight: 900; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        button:disabled { opacity: 0.3; }

        #resetLink { text-align: center; font-size: 10px; color: #ccc; margin-top: 15px; text-decoration: underline; }
    </style>
</head>
<body>

<div id="splash">
    <img src="pslogo.svg" alt="PlantShed Logo" style="width: 85%; max-width: 360px; height: auto;">
</div>
    
<div class="container">
    <div class="logo-container">
        <img src="pslogo.svg" alt="PlantShed Logo" style="height: 50px; width: auto; max-width: 90%;">
    </div>

    <div class="card">
        <h2 id="greeting">Field Log</h2>
        
        <div id="workerArea">
            <label>Employee Name</label>
            <select id="worker">
                <option value="" disabled selected>Loading staff...</option>
            </select>
        </div>

        <label>Account & Site Address</label>
        <select id="site">
            <option value="" disabled selected>Loading clients...</option>
        </select>

        <label>Job Type</label>
        <select id="task">
            <option value="Routine Maintenance">Routine Maintenance</option>
            <option value="Install">Install</option>
            <option value="Audit">Audit</option>
        </select>

        <div id="gpsBox" class="gps-status">🛰️ Verifying location...</div>
    </div>

    <div class="footer">
        <button id="inBtn" class="btn btn-in" disabled>Clock In</button>
        <button id="outBtn" class="btn btn-out" disabled>Clock Out</button>
    </div>

    <div id="resetLink" onclick="resetUser()">Switch User / Reset Device</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxp4Wv1YVOqlCuXsYXLr7wgTySVQrOJW-Vi2T5mTQ4gwpCS8b5IT6ggbaECLNcPFya9/exec";
    let loc = null;
    let clientList = [];

    // --- 1. INITIAL LOAD ---
    window.onload = async function() {
        // Splash screen fade
        setTimeout(() => document.getElementById('splash').classList.add('hide-splash'), 1500);

        // Load Employee & Client Data from Google Sheets (via doGet)
        loadData();

        // Check for "Remembered" User
        const savedUser = localStorage.getItem('ps_user');
        if (savedUser) {
            document.getElementById('greeting').innerText = "Hello, " + savedUser;
            // We'll auto-select the dropdown once data arrives
        }

        // Start GPS
        initGPS();
    };

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            
            // Populate Employees
            const workerSelect = document.getElementById('worker');
            workerSelect.innerHTML = '<option value="" disabled selected>-- Select Name --</option>';
            data.employees.forEach(name => {
                const opt = document.createElement('option');
                opt.value = opt.innerText = name;
                workerSelect.appendChild(opt);
            });

            // Populate Clients (Formatted with Address)
            const siteSelect = document.getElementById('site');
            siteSelect.innerHTML = '<option value="" disabled selected>-- Select Account --</option>';
            clientList = data.clients;
            data.clients.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.account + "|" + c.address; // Store both for the script
                opt.innerText = c.account + " - " + c.address; // Visual combo
                siteSelect.appendChild(opt);
            });

            // Auto-select if remembered
            const savedUser = localStorage.getItem('ps_user');
            if (savedUser) workerSelect.value = savedUser;

        } catch (e) {
            console.error("Load failed", e);
        }
    }

    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const acc = Math.round(pos.coords.accuracy);
            loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const status = document.getElementById('gpsBox');
            
            if (acc <= 150) {
                status.innerHTML = `✅ Location ready`;
                status.className = "gps-status ready";
                document.getElementById('inBtn').disabled = false;
                document.getElementById('outBtn').disabled = false;
            } else {
                status.innerHTML = `🛰️ Searching... (${acc}m)`;
            }
        }, null, { enableHighAccuracy: true });
    }

    async function submit(action) {
        const worker = document.getElementById('worker').value;
        const siteRaw = document.getElementById('site').value;
        const task = document.getElementById('task').value;

        if (!worker || !siteRaw) return alert("Select Name and Account.");

        // Split Account and Address
        const [account, siteAddress] = siteRaw.split("|");

        // UI Feedback
        document.getElementById('gpsBox').innerText = "⌛ Logging...";
        document.getElementById('inBtn').disabled = true;
        document.getElementById('outBtn').disabled = true;

        try {
            // Save user to device memory
            localStorage.setItem('ps_user', worker);

            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    worker: worker,
                    account: account,
                    siteAddress: siteAddress,
                    task: task,
                    action: action,
                    gps: `${loc.lat},${loc.lng}`
                })
            });

            alert("Logged Successfully!");
            location.reload();
        } catch (e) {
            alert("Error saving log.");
            location.reload();
        }
    }

    function resetUser() {
        if (confirm("Reset device memory?")) {
            localStorage.removeItem('ps_user');
            location.reload();
        }
    }

    document.getElementById('inBtn').onclick = () => submit("CLOCK IN");
    document.getElementById('outBtn').onclick = () => submit("CLOCK OUT");
</script>
</body>
</html>
