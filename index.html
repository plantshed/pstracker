<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Field Maintenance Log</title>
    <style>
        :root { --success: #28a745; --danger: #dc3545; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column;
        }

        .container {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; max-width: 500px; margin: 0 auto; width: 100%;
        }

        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        h2 { margin: 0 0 20px 0; text-align: center; color: #333; font-size: 1.6rem; }
        
        label { font-weight: bold; color: #666; font-size: 0.9rem; display: block; margin-top: 15px; }
        
        input, select { 
            width: 100%; padding: 16px; margin-top: 8px; 
            border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; 
            background: #fafafa; outline: none;
        }

        .gps-status { 
            margin: 20px 0; padding: 15px; border-radius: 12px; 
            text-align: center; font-weight: bold; font-size: 1rem;
            transition: 0.3s;
        }
        .searching { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .btn-group { 
            margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            padding-bottom: env(safe-area-inset-bottom, 30px);
        }

        .btn { 
            height: 120px; border: none; border-radius: 20px; color: white; 
            font-size: 1.4rem; font-weight: 900; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        .btn:disabled { background: #ccc; opacity: 0.5; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>Field Log</h2>
        
        <label>Worker Name</label>
        <input type="text" id="worker" placeholder="Enter Full Name">

        <label>Task Type</label>
        <select id="task">
            <option value="Install">Install</option>
            <option value="Routine Maintenance">Routine Maintenance</option>
            <option value="Audit">Audit</option>
        </select>

        <div id="gpsStatus" class="gps-status searching">🛰️ INITIALIZING GPS...</div>
    </div>

    <div class="btn-group">
        <button id="inBtn" class="btn btn-in" disabled>CLOCK<br>IN</button>
        <button id="outBtn" class="btn btn-out" disabled>CLOCK<br>OUT</button>
    </div>
</div>

<script>
    // --- REPLACE THIS URL WITH YOUR DEPLOYED GOOGLE SCRIPT URL ---
    const SCRIPT_URL = "https://script.google.com/a/macros/plantshed.com/s/AKfycbxphdTmf2J332dzgkIkdYTMCr7f91_-bTYJ9yLGvxUVyb_imneyAAt5OQl4_17y_eji/exec";
    
    let loc = null;

    function startGPS() {
        if (!navigator.geolocation) {
            document.getElementById('gpsStatus').innerText = "❌ GPS NOT SUPPORTED";
            return;
        }

        navigator.geolocation.watchPosition((pos) => {
            const acc = Math.round(pos.coords.accuracy);
            loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: acc };
            
            const status = document.getElementById('gpsStatus');
            if (acc <= 250) {
                status.innerHTML = `✅ GPS READY (${acc}m)`;
                status.className = "gps-status ready";
                document.getElementById('inBtn').disabled = false;
                document.getElementById('outBtn').disabled = false;
            } else {
                status.innerHTML = `⚠️ WEAK SIGNAL (${acc}m)...`;
                status.className = "gps-status searching";
            }
        }, (err) => {
            alert("Please allow Location access in your browser settings.");
        }, { enableHighAccuracy: true });
    }

    async function submit(action) {
        const worker = document.getElementById('worker').value;
        if (!worker) return alert("Please enter your name.");

        document.getElementById('inBtn').disabled = true;
        document.getElementById('outBtn').disabled = true;
        document.getElementById('gpsStatus').innerText = "⌛ SAVING TO LOG...";

        try {
            await fetch(https://script.google.com/macros/s/AKfycbz4e6TYfhKAyugAxWoVP49lw367aLlb1t7Let1z7c0hDCb_TB-p0hImbpfB48kkDRRp/exec, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    worker: worker,
                    task: document.getElementById('task').value,
                    action: action,
                    gps: `${loc.lat},${loc.lng}`,
                    accuracy: loc.acc + "m"
                })
            });
            alert("Success: Logged!");
            location.reload();
        } catch (e) {
            alert("Error saving log. Try again.");
            document.getElementById('inBtn').disabled = false;
            document.getElementById('outBtn').disabled = false;
        }
    }

    document.getElementById('inBtn').onclick = () => submit("IN");
    document.getElementById('outBtn').onclick = () => submit("OUT");
    
    window.onload = startGPS;
</script>

</body>
</html>
