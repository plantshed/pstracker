<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Plantshed Log</title>
    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #1a73e8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f0f2f5; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
        }

        /* FULL SCREEN OVERLAY - MUST CLICK TO START */
        #startScreen {
            position: fixed; inset: 0; background: #ffffff; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }

        .container { flex: 1; display: flex; flex-direction: column; padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        h2 { margin: 0 0 10px 0; color: #333; }
        label { font-weight: bold; color: #666; font-size: 0.9rem; display: block; margin-top: 15px; }
        
        input, select { width: 100%; padding: 15px; margin-top: 5px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; }

        .gps-status { padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin: 20px 0; border: 2px solid #ddd; background: #eee; }
        .ready { background: #d4edda; color: #155724; border-color: #c3e6cb; }

        .footer { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 50px; }
        .btn { height: 110px; border: none; border-radius: 20px; color: white; font-size: 1.3rem; font-weight: 800; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        button:disabled { opacity: 0.3; }

        .activate-btn { 
            padding: 25px 50px; background: var(--primary); color: white; 
            border: none; border-radius: 50px; font-size: 1.4rem; font-weight: bold; 
            box-shadow: 0 10px 20px rgba(26, 115, 232, 0.3);
        }
    </style>
</head>
<body>

<div id="startScreen">
    <h1 style="color: var(--primary); margin-bottom: 10px;">Maintenance Log</h1>
    <p style="color: #666; margin-bottom: 30px;">Tap to enable location tracking for this session.</p>
    <button class="activate-btn" onclick="runGPS()">ACTIVATE APP</button>
</div>

<div class="container">
    <div class="card">
        <h2>Site Entry</h2>
        <label>Worker Name</label>
