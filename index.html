<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlantShed Field Log</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=7">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.png?v=7">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#404041">

    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #404041; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f2f2f2; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
        }
        #splash {
            position: fixed; inset: 0; background: #FFFFFF; z-index: 10001;
            display: flex; 
            align-items: center;
            justify-content: center;
            transition: opacity .3s ease-out, visibility 0.5s;
        }
        #splash img { 
            width: 85%; 
            max-width: 360px; 
            height: auto;
            display: block; 
            transform: translate(0, -20px); 
        }
        .hide-splash { opacity: 0; visibility: hidden; }

        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 10px 15px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            padding-bottom: calc(40px + env(safe-area-inset-bottom)); 
        }

        .logo-container { 
            text-align: center; 
            padding: 10px 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .logo-container img { height: 75px; width: auto; max-width: 90%; display: block; }

        .card { background: white; padding: 15px ; border-radius: 12px; box-shadow: 0 4px 7px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 8px 0; text-align: center; color: var(--primary); font-size: 1rem; font-weight: 600; }
        label { font-weight: bold; color: #666; font-size: 0.85rem; display: block; margin-top: 10px; }
        
        #addressDisplay {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        select, input { 
            width: 100%; padding: 10px; margin-top: 5px; border: 2px solid #eee; 
            border-radius: 12px; font-size: 1rem; background: #fafafa; outline: none; 
        }

        .gps-status { margin: 12px 40px; transform: translate(0, 10px); padding: 7px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 0.75rem; background: #eee; color: #666; }
        .ready { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        .footer { margin-top: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-bottom: 10px; }
        
        .btn { height: 100px; border: none; border-radius: 12px; color: white; font-size: 1.5rem; font-weight: 400; }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        button:disabled { opacity: 0.3; }

        #resetLink { text-align: center; font-size: 10px; color: #bbb; margin-top: 10px; padding-bottom: 15px; text-decoration: underline; cursor: pointer; }

        .status-option {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: #fafafa;
            font-size: 0.95rem;
            color: #444;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }

        .status-option.active {
            border-color: var(--success);
            background: #e8f5e9;
            color: #155724;
            font-weight: bold;
        }

        .menu-footer {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
        }

        .btn-small {
            height: 50px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div id="splash">
    <img src="pslogo.svg" alt="PlantShed Logo">
</div>
    
<div class="container">
    <div class="logo-container">
        <img src="pslogo.svg" alt="PlantShed Logo">
    </div>

    <div class="card">
        <h2 id="greeting">Field Log</h2>
        
        <div id="workerArea">
            <label>Employee Name</label>
            <select id="worker">
                <option value="" disabled selected>Loading Employees...</option>
            </select>
        </div>

        <label>Account & Site Address</label>
        <select id="site">
            <option value="" disabled selected>Waiting for GPS...</option>
        </select>

        <div id="addressDisplay" style="font-size: .9rem; color: #404040; margin-top: 10px; padding: 0 5px; min-height: 14px; font-style: italic;"></div>

        <label>Job Type</label>
        <select id="task">
            <option value="Routine Maintenance">Routine Maintenance</option>
            <option value="Install">Install</option>
            <option value="Audit">Audit</option>
        </select>

        <div id="gpsBox" class="gps-status">🛰️ Verifying location...</div>
    </div>

    <div class="footer">
        <button id="inBtn" class="btn btn-in" disabled>Check In</button>
        <button id="outBtn" class="btn btn-out" disabled>Check Out</button>
    </div>

    <div id="resetLink" onclick="resetUser()">Switch User / Reset Device</div>
</div>

<div id="outMenu" style="display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:20000; align-items:center; justify-content:center; padding:20px;">
    <div class="card" style="width:100%; max-width:400px;">
        <h3 style="margin:0 0 15px 0; text-align:center; font-size:1.1rem;">Clock Out Status</h3>
        
        <div id="optionsList">
            <div class="status-option" onclick="selectOption(this, 'Completed')">Job has been completed</div>
            <div class="status-option" onclick="selectOption(this, 'No Access')">I was not able to access site</div>
            <div class="status-option" onclick="selectOption(this, 'Replacement Noted')">Maintenance team noted replacement</div>
        </div>

        <div class="menu-footer">
            <button id="submitMenuBtn" class="btn-small btn-in" style="opacity:0.3;" disabled onclick="processFinalOut()">Submit</button>
            <button id="cancelMenuBtn" class="btn-small btn-out" onclick="closeMenu()">Cancel</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby0oeKCuEiXxaGYWkQXAe3Fg65g5t3dqpUSW7jLNXuPFayH4GaaDoyTgx7wRGCwFv9h/exec";
    let loc = null;
    let clientList = [];
    let selectedStatus = ""; 

    setInterval(checkServerForUpdates, 1800000);
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === "visible") checkServerForUpdates(); });

    async function checkServerForUpdates() {
        try {
            const versionCheckUrl = "manifest.json?v=" + new Date().getTime();
            const response = await fetch(versionCheckUrl, { method: 'GET', cache: 'no-store' });
            const lastModified = response.headers.get("Last-Modified");
            const cachedModified = localStorage.getItem("last_update");
            if (cachedModified && lastModified !== cachedModified) {
                localStorage.setItem("last_update", lastModified);
                window.location.href = window.location.origin + window.location.pathname + "?update=" + new Date().getTime();
            } else {
                localStorage.setItem("last_update", lastModified);
            }
        } catch (err) { console.log("Update check skipped"); }
    }
    checkServerForUpdates();

    window.onload = async function() {
        setTimeout(() => document.getElementById('splash').classList.add('hide-splash'), 1500);
        await loadData();
        initGPS();
    };

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            const data = await response.json();
            const workerSelect = document.getElementById('worker');
            workerSelect.innerHTML = '<option value="" disabled selected>Select Name</option>';
            data.employees.forEach(name => {
                const opt = document.createElement('option');
                opt.value = opt.innerText = name;
                workerSelect.appendChild(opt);
            });
            clientList = data.clients; 
            const savedUser = localStorage.getItem('ps_user');
            if (savedUser) workerSelect.value = savedUser;
        } catch (e) { console.error("Load failed", e); }
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
    }

    function initGPS() {
        navigator.geolocation.watchPosition((pos) => {
            const acc = Math.round(pos.coords.accuracy);
            loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const status = document.getElementById('gpsBox');
            if (acc <= 150) {
                status.innerHTML = `✅ Location ready`;
                status.className = "gps-status ready";
                document.getElementById('inBtn').disabled = false;
                document.getElementById('outBtn').disabled = false;
                updateNearbySites(); 
            } else {
                status.innerHTML = `🛰️ Searching... (${acc}m)`;
                document.getElementById('inBtn').disabled = true;
                document.getElementById('outBtn').disabled = true;
            }
        }, (err) => {
            document.getElementById('gpsBox').innerText = "❌ GPS blocked! Check settings.";
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
    }

    function syncAddressLabel() {
        const val = document.getElementById('site').value;
        const display = document.getElementById('addressDisplay');
        if (val && val.includes("|")) {
            display.innerHTML = "📍 " + val.split("|")[1];
        } else {
            display.innerHTML = "";
        }
    }

    function updateNearbySites() {
        if (!loc || !clientList || clientList.length === 0) return;
        const siteSelect = document.getElementById('site');
        const currentSelection = siteSelect.value;
        const nearby = clientList.filter(site => getDistance(loc.lat, loc.lng, site.lat, site.lng) <= 150);

        siteSelect.innerHTML = '';
        if (nearby.length === 0) {
            const opt = document.createElement('option');
            opt.innerText = "No sites found nearby.";
            opt.disabled = true; opt.selected = true;
            siteSelect.appendChild(opt);
        } else {
            const prompt = document.createElement('option');
            prompt.innerText = "Select Nearby Client";
            prompt.value = ""; 
            prompt.disabled = true; 
            prompt.selected = !currentSelection; 
            siteSelect.appendChild(prompt);

            nearby.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.account + "|" + c.address;
                opt.innerText = c.account; 
                if (opt.value === currentSelection) opt.selected = true;
                siteSelect.appendChild(opt);
            });
        }
        syncAddressLabel();
    }

    // --- OVERLAY LOGIC ---
    function selectOption(element, statusValue) {
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        selectedStatus = statusValue;
        const subBtn = document.getElementById('submitMenuBtn');
        subBtn.disabled = false;
        subBtn.style.opacity = "1";
    }

    function closeMenu() {
        document.getElementById('outMenu').style.display = 'none';
        selectedStatus = "";
        document.getElementById('submitMenuBtn').disabled = true;
        document.getElementById('submitMenuBtn').style.opacity = "0.3";
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
    }

    async function processFinalOut() {
        if (!selectedStatus) return;
        const status = selectedStatus;
        closeMenu();
        await submit("CLOCK OUT", status);
    }

    // --- SUBMIT LOGIC ---
    async function submit(action, statusUpdate = "DONE") {
        const worker = document.getElementById('worker').value;
        const siteRaw = document.getElementById('site').value;
        const task = document.getElementById('task').value;

        if (!worker || !siteRaw || siteRaw === "") return alert("Please select your Name and a valid Site.");

        const [account, siteAddress] = siteRaw.split("|");
        document.getElementById('gpsBox').innerText = "⌛ Logging...";
        document.getElementById('inBtn').disabled = true;
        document.getElementById('outBtn').disabled = true;

        try {
            localStorage.setItem('ps_user', worker);
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    worker: worker,
                    account: account,
                    siteAddress: siteAddress,
                    task: task,
                    action: action,
                    statusUpdate: statusUpdate,
                    gps: `${loc.lat},${loc.lng}`
                })
            });
            alert("Logged Successfully!");
            location.reload();
        } catch (e) { 
            alert("Error saving log."); 
            location.reload(); 
        }
    }

    function resetUser() {
        if (confirm("Reset device memory?")) {
            localStorage.removeItem('ps_user');
            location.reload();
        }
    }

    document.getElementById('inBtn').onclick = () => submit("CLOCK IN");
    document.getElementById('outBtn').onclick = () => {
        const siteRaw = document.getElementById('site').value;
        if (!siteRaw || siteRaw === "") return alert("Please select a Site first.");
        document.getElementById('outMenu').style.display = 'flex';
    };
    document.getElementById('site').addEventListener('change', syncAddressLabel);
</script>
</body>
</html>
