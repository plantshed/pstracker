<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PlantShed Maintenance Field Log</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=6">
    <link rel="apple-touch-icon" sizes="192x192" href="icon.png?v=6">
    <link rel="shortcut icon" type="image/png" href="icon.png?v=6">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#404041">

    <style>
        :root { --success: #28a745; --danger: #dc3545; --primary: #404041; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: #f0f2f5; margin: 0; padding: 0; 
            height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; 
        }

        /* SPLASH SCREEN - DARK BG */
        #splash {
        position: fixed; 
        inset: 0; 
        background: #FFFFFF; 
        z-index: 10001;
        display: flex; 
        align-items: center; 
        justify-content: center;
        transition: opacity 0.5s ease-out, visibility 0.5s;
    }

    #splash svg { 
        /* Use a percentage for the width so it never "breaks" the screen */
        width: 85%; 
        height: auto;
        max-width: 360px; /* Adjust this to your preferred "max px" */
        display: block;
    }

    .hide-splash { opacity: 0; visibility: hidden; }

        /* CONTAINER WITH 100PX BUFFER */
        .container { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 15px; 
            max-width: 500px; 
            margin: 0 auto; 
            width: 100%; 
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
        }

        .logo-container { text-align: center; padding: 20px 0; display: flex; justify-content: center; align-items: center; }
        .logo-container svg { height: 50px; width: auto; max-width: 90%; display: block; }

        .card { background: white; padding: 20px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { margin: 0 0 10px 0; text-align: center; color: #404041; font-size: 1.2rem; text-transform: none; letter-spacing: 1px; }
        label { font-weight: bold; color: #666; font-size: 0.8rem; display: block; margin-top: 12px; text-transform: none; }
        input, select { width: 100%; padding: 14px; margin-top: 5px; border: 2px solid #eee; border-radius: 12px; font-size: 1.1rem; background: #fafafa; outline: none; }

        .gps-status { margin: 15px 0; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 0.9rem; background: #eee; color: #666; }
        .ready { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }

        .footer { 
            margin-top: auto; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        
        .btn { height: 110px; border: none; border-radius: 18px; color: white; font-size: 1.3rem; font-weight: 900; box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .btn-in { background: var(--success); }
        .btn-out { background: var(--danger); }
        button:disabled { opacity: 0.5; }
    </style>
</head>

    <div class="card">
        <h2>Maintenance Field Log</h2>
        
        <label>Employee Name</label>
        <input type="text" id="worker" placeholder="Full Name" spellcheck="false">

        <label>Select Job Type</label>
        <select id="task">
            <option value="Install">Install</option>
            <option value="Routine Maintenance">Routine Maintenance</option>
            <option value="Audit">Audit</option>
        </select>

        <div id="gpsBox" class="gps-status">🛰️ Verifying location...</div>
    </div>

    <div class="footer">
        <button id="inBtn" class="btn btn-in" disabled>Check In</button>
        <button id="outBtn" class="btn btn-out" disabled>Check Out</button>
    </div>
</div>

<script>
    
    document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === "visible") {
        checkServerForUpdates();
    }
});

function checkServerForUpdates() {
    
    fetch("manifest.json?nocache=" + new Date().getTime(), { method: 'HEAD' })
        .then(response => {
            const lastModified = response.headers.get("Last-Modified");
            const cachedModified = localStorage.getItem("last_update");

            if (cachedModified && lastModified !== cachedModified) {
                localStorage.setItem("last_update", lastModified);
              
                window.location.reload(true); 
            } else {
                localStorage.setItem("last_update", lastModified);
            }
        })
        .catch(err => console.log("Offline or check failed"));
}

// Run once on initial load
checkServerForUpdates();
    
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxp4Wv1YVOqlCuXsYXLr7wgTySVQrOJW-Vi2T5mTQ4gwpCS8b5IT6ggbaECLNcPFya9/exec";
    
    let loc = null;

    // Splash Screen Logic
    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').classList.add('hide-splash');
        }, 1500); 
    });

    window.onload = function() {
        if (!navigator.geolocation) {
            document.getElementById('gpsBox').innerText = "❌ GPS not supported. Please refresh.";
            return;
        }

        navigator.geolocation.watchPosition((pos) => {
            const acc = Math.round(pos.coords.accuracy);
            loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            const status = document.getElementById('gpsBox');
            
            // Unlocks at 150m accuracy
            if (acc <= 150) {
                status.innerHTML = `✅ Location verified`;
                status.className = "gps-status ready";
                document.getElementById('inBtn').disabled = false;
                document.getElementById('outBtn').disabled = false;
            } else {
                status.innerHTML = `🛰️ SEARCHING... (${acc}m)`;
            }
        }, (err) => {
            document.getElementById('gpsBox').innerText = "❌ GPS blocked! Please allow in settings.";
        }, { enableHighAccuracy: true });
    };

    async function submit(action) {
        const worker = document.getElementById('worker').value.trim();
        if (!worker) return alert("Please enter your name.");

        const inBtn = document.getElementById('inBtn');
        const outBtn = document.getElementById('outBtn');
        const box = document.getElementById('gpsBox');

        inBtn.disabled = outBtn.disabled = true;
        box.innerText = "⌛ SAVING...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    worker: worker,
                    task: document.getElementById('task').value,
                    action: action,
                    gps: `${loc.lat},${loc.lng}`
                })
            });
            alert("Success: Logged!");
            location.reload();
        } catch (e) {
            alert("Connection error. Try again.");
            inBtn.disabled = false;
            outBtn.disabled = false;
        }
    }

    document.getElementById('inBtn').onclick = () => submit("Checked In");
    document.getElementById('outBtn').onclick = () => submit("Checked Out");
</script>
